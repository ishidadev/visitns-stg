<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>保育園見学チェックリスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --blue:#1e5a8c;--blue-bg:#eef5fc;
    --green:#2e7d32;--green-bg:#edf7ee;
    --red:#c62828;--red-bg:#fdf2f2;
    --orange:#e65100;--orange-bg:#fdf7ef;
    --yellow:#7a6800;--yellow-bg:#fffae6;
    --pink:#c2185b;--pink-bg:#fce4ec;
    --gray:#555;--gray-bg:#f5f5f5;
    --surface:#fff;--bg:#f2f4f7;
    --text:#222;--sub:#666;--border:#e4e7ec;
    --radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  /* ===== DARK MODE ===== */
  body.dark{
    --surface:#1e1e2e;--bg:#12121c;
    --text:#e0e0ef;--sub:#aaa;--border:#333;
    --gray-bg:#252535;--blue-bg:#1a2a3a;--green-bg:#1a2a1a;
    --red-bg:#2a1a1a;--orange-bg:#2a1e10;--yellow-bg:#2a2410;--pink-bg:#2a1020;
  }
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s;}

  /* ===== HEADER ===== */
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px 6px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,0.07);}
  .header-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .hamburger-btn{background:none;border:none;cursor:pointer;font-size:22px;padding:2px 4px;line-height:1;color:var(--text);flex-shrink:0;}
  .app-title{font-size:13px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .school-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .school-tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
  .tab-btn.active{background:var(--blue);color:#fff;font-weight:700;}
  .tab-btn.inactive{background:#e8ecf0;color:#555;font-weight:500;}
  body.dark .tab-btn.inactive{background:#2a2a3a;color:#aaa;}
  .tab-add{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1.5px dashed #aaa;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:inherit;}

  /* ===== SYNC STATUS ===== */
  #sync-status{font-size:10px;padding:3px 8px;border-radius:10px;color:white;background:#777;font-weight:bold;white-space:nowrap;flex-shrink:0;}
  .status-saved{background:#2e7d32!important;}
  .status-saving{background:#f57f17!important;}
  .status-trial{background:#7b1fa2!important;}

  /* ===== DRAWER ===== */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;}
  .drawer-overlay.open{display:block;}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--surface);box-shadow:4px 0 24px rgba(0,0,0,0.18);z-index:501;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column;overflow:hidden;}
  .drawer.open{transform:translateX(0);}
  .drawer-top{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
  .drawer-title{font-weight:700;font-size:14px;color:var(--text);}
  .drawer-user{font-size:11px;color:var(--sub);margin-top:3px;word-break:break-all;}
  .drawer-section{padding:10px 16px;border-bottom:1px solid var(--border);}
  .drawer-section.scrollable{flex:1;overflow-y:auto;}
  .drawer-label{font-size:10px;font-weight:700;color:var(--sub);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
  .drawer-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
  .drawer-item:active{opacity:.6;}
  /* 園一覧アイテム（ドラッグ並び替え） */
  .drawer-school-row{display:flex;align-items:center;gap:4px;padding:4px 0;cursor:default;}
  .drawer-school-row.dragging{opacity:.35;}
  .drawer-school-row.drag-over{border-top:2px solid var(--blue);}
  .drag-handle{font-size:16px;color:#bbb;cursor:grab;padding:2px 4px;flex-shrink:0;user-select:none;touch-action:none;}
  .drag-handle:active{cursor:grabbing;}
  .drawer-school-name{flex:1;padding:5px 8px;border-radius:8px;font-size:13px;cursor:pointer;transition:background .15s;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .drawer-school-name.active{background:var(--blue);color:#fff;font-weight:700;}
  .drawer-school-name:not(.active):hover{background:var(--gray-bg);}
  .drawer-add-btn{color:var(--blue);margin-top:4px;padding:6px 8px;font-size:13px;}
  .mode-row{display:flex;gap:4px;background:#e8ecf0;padding:3px;border-radius:20px;}
  body.dark .mode-row{background:#2a2a3a;}
  .mode-btn{flex:1;padding:5px 0;border-radius:16px;border:none;font-size:11px;font-family:inherit;cursor:pointer;background:transparent;color:#555;font-weight:500;transition:all .2s;}
  body.dark .mode-btn{color:#aaa;}
  .mode-btn.active{background:#fff;color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  body.dark .mode-btn.active{background:#3a3a4a;color:var(--text);}
  .dark-mode-row{display:flex;align-items:center;justify-content:space-between;}
  .toggle-switch{position:relative;width:42px;height:23px;flex-shrink:0;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:23px;transition:.2s;cursor:pointer;}
  .toggle-slider:before{content:"";position:absolute;width:17px;height:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
  input:checked+.toggle-slider{background:var(--blue);}
  input:checked+.toggle-slider:before{transform:translateX(19px);}

  /* ===== UPGRADE BANNER ===== */
  .upgrade-banner{background:linear-gradient(135deg,#7b1fa2,#e65100);color:#fff;padding:10px 14px;border-radius:12px;font-size:12px;text-decoration:none;display:block;text-align:center;font-weight:700;margin:8px 16px;}
  .upgrade-banner:hover{opacity:.9;}
  .upgrade-section{padding:10px 0;border-top:1px solid var(--border);}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--surface);border-radius:18px;padding:22px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text);}
  .modal-input{width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s;background:var(--surface);color:var(--text);}
  .modal-input:focus{border-color:var(--blue);}
  .modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
  .btn-cancel{padding:8px 16px;border-radius:10px;border:1px solid #ddd;background:var(--surface);cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);}
  .btn-primary{padding:8px 16px;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}

  /* ===== MAIN CONTENT ===== */
  .main{padding:8px 10px 80px;}
  .school-header{background:var(--surface);border-radius:var(--radius);padding:10px 13px;margin-bottom:8px;box-shadow:var(--shadow);}
  .school-name-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;min-width:0;}
  .school-name-input{flex:1;min-width:0;font-size:16px;font-weight:700;border:none;border-bottom:2px solid #e0e0e0;padding:3px 0;outline:none;font-family:inherit;background:transparent;color:var(--text);transition:border .2s;}
  .school-name-input:focus{border-color:var(--blue);}
  .delete-btn{background:none;border:none;color:#e57373;font-size:20px;cursor:pointer;padding:2px;flex-shrink:0;line-height:1;}
  .date-row{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:12px;}
  .date-input{border:none;border-bottom:1px solid #ddd;font-size:12px;color:var(--text);outline:none;font-family:inherit;background:transparent;padding:2px 0;}

  /* ===== SECTION ===== */
  .section{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);}
  .section-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border:none;cursor:pointer;text-align:left;background:var(--surface);transition:background .2s;font-family:inherit;}
  .section-header.open{background:var(--sec-bg);}
  .section-title{font-weight:700;font-size:13px;color:var(--sec-color);}
  .section-arrow{font-size:12px;color:#bbb;}
  .section-body{border-top:2px solid var(--sec-bg);}
  .progress-bar{height:3px;background:#f0f0f0;}
  .progress-fill{height:3px;border-radius:2px;background:var(--sec-color);transition:width .3s;}

  /* ===== ROWS ===== */
  .row{padding:8px 12px;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row-label{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
  .badge{font-size:9px;padding:2px 5px;border-radius:4px;color:#fff;font-weight:700;flex-shrink:0;}
  .badge-req{background:#e65100;}
  .badge-pre{background:#1e5a8c;}
  .label-text{font-size:12px;font-weight:600;color:var(--sub);}

  /* ===== CHIPS ===== */
  .chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{padding:5px 10px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid var(--sec-color);background:var(--surface);color:var(--sec-color);font-weight:500;transition:all .15s;-webkit-user-select:none;}
  .chip.selected{background:var(--sec-color);color:#fff;font-weight:700;}
  .chip:active{opacity:0.7;transform:scale(0.96);}

  /* ===== INPUTS ===== */
  .text-input{width:100%;padding:7px 10px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;color:var(--text);background:var(--surface);}
  .text-input:focus{border-color:var(--sec-color);}
  .time-input{max-width:140px;width:auto;}
  .note-input{margin-top:5px;width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;color:var(--sub);background:var(--bg);}
  .note-input:focus{border-color:var(--sec-color);background:var(--surface);}
  /* ===== MEMO TOGGLE ===== */
  .memo-btn{padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4;transition:background .15s;flex-shrink:0;}
  .memo-btn:hover{background:var(--gray-bg);}
  .memo-btn.has-note{border-color:var(--sec-color);color:var(--sec-color);background:var(--sec-bg,#f5f5f5);}
  .chips-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
  .input-row{display:flex;align-items:center;gap:6px;}
  .input-row .text-input{flex:1;min-width:0;}
  .note-wrap{margin-top:4px;}
  .textarea{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:90px;transition:border .2s;color:var(--text);background:var(--surface);}
  .textarea:focus{border-color:var(--sec-color);}

  /* ===== AGE GROUP ===== */
  .agegroup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
  .agegroup-item{display:flex;align-items:center;gap:4px;}
  .agegroup-label{font-size:10px;color:var(--sub);min-width:30px;flex-shrink:0;}
  .agegroup-input{width:2.8em;flex-shrink:0;padding:4px 4px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;outline:none;color:var(--text);background:var(--surface);text-align:center;}
  .agegroup-input:focus{border-color:var(--sec-color);}

  /* ===== STARS ===== */
  .stars{display:flex;gap:4px;}
  .star-btn{background:none;border:none;cursor:pointer;font-size:28px;padding:2px;line-height:1;transition:color .1s,transform .1s;}
  .star-btn:active{transform:scale(0.85);}

  /* ===== EMPTY STATE ===== */
  .empty-state{padding:50px 20px;text-align:center;color:#aaa;}
  .empty-icon{font-size:50px;margin-bottom:10px;}
  .empty-text{font-size:13px;line-height:1.6;}

  /* ===== PROGRESS TAG ===== */
  .progress-tag{font-size:10px;color:var(--sec-color);opacity:.7;margin-left:6px;font-weight:500;}

  /* ===== EXPORT AREA ===== */
  .export-area{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px 10px;display:flex;gap:5px;}
  body.dark .export-area{background:rgba(30,30,46,.93);}
  .export-btn{flex:1;padding:10px 2px;border-radius:12px;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-export{background:var(--green);color:#fff;}
  .btn-expand{background:var(--blue-bg);color:var(--blue);}
  .btn-collapse{background:#e8ecf0;color:#555;}
  body.dark .btn-collapse{background:#2a2a3a;color:#aaa;}

  /* ===== A3 MODE ===== */
  body.mode-a3{background:#ffffff;padding:15px;}
  body.mode-a3 .main{max-width:100%!important;padding:10px 0 40px 0;}
  body.mode-a3 .main-container-grid{column-count:4;column-gap:16px;width:100%;}
  body.mode-a3 .section{display:inline-block;width:100%;break-inside:avoid;page-break-inside:avoid;box-shadow:none;border:1px solid #ccc;margin-bottom:14px;border-radius:6px;}
  body.mode-a3 .section-body{display:block!important;}
  body.mode-a3 .section-arrow,body.mode-a3 .progress-bar{display:none!important;}
  body.mode-a3 .export-area{display:none!important;}
  body.mode-a3 .chip{padding:4px 8px;font-size:11px;}

  /* ===== LOGIN ===== */
  #login-overlay{position:fixed;inset:0;background:#f4f7f9;z-index:9999;display:flex;justify-content:center;align-items:center;padding:16px;}
  .login-box{background:white;padding:32px 28px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);width:100%;max-width:360px;text-align:center;}
  .login-box h2{font-size:18px;color:#333;margin-bottom:6px;font-weight:700;}
  .login-box .login-sub{font-size:12px;color:#666;margin-bottom:16px;}
  .login-divider{display:flex;align-items:center;gap:8px;margin:14px 0;color:#ccc;font-size:12px;}
  .login-divider:before,.login-divider:after{content:"";flex:1;height:1px;background:#eee;}
  .login-box input{width:100%;padding:10px 13px;margin:4px 0;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;font-family:inherit;}
  .login-box input:focus{border-color:#1e5a8c;}
  .btn-login-email{width:100%;padding:11px;background:#1e5a8c;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;margin-top:10px;font-family:inherit;}
  .btn-login-google{width:100%;padding:11px;background:#fff;color:#333;border:1.5px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
  .btn-login-google:active{opacity:.8;}
  .google-logo{width:20px;height:20px;flex-shrink:0;}
  #login-error{color:red;font-size:12px;margin-top:8px;font-weight:500;min-height:18px;}
  .trial-divider{display:flex;align-items:center;gap:8px;margin:14px 0;color:#ccc;font-size:12px;}
  .trial-divider:before,.trial-divider:after{content:"";flex:1;height:1px;background:#eee;}
  .btn-trial{width:100%;padding:11px;background:#f3e5f5;color:#7b1fa2;border:1.5px solid #ce93d8;border-radius:10px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit;}
  .btn-trial:hover{background:#e1bee7;}
  .trial-note{font-size:11px;color:#888;margin-top:6px;line-height:1.5;}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-overlay">
  <div class="login-box">
    <h2>🏫 保育園見学チェックリスト</h2>
    <p class="login-sub">閲覧・編集には認証が必要です</p>
    <button class="btn-login-google" onclick="window.handleGoogleLogin()">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </button>
    <div class="login-divider">またはメールで</div>
    <input type="email" id="login-email" placeholder="メールアドレス">
    <input type="password" id="login-password" placeholder="パスワード" onkeydown="if(event.key==='Enter')window.handleLogin()">
    <button class="btn-login-email" onclick="window.handleLogin()">メール・PWでログイン</button>
    <p id="login-error"></p>
    <div class="trial-divider">または</div>
    <button class="btn-trial" onclick="window.startTrial()">🔍 まず試してみる（無料・2園まで）</button>
    <p class="trial-note">アカウント登録不要で今すぐ試用できます<br>※データはこの端末にのみ保存されます</p>
  </div>
</div>

<!-- ===== DRAWER ===== -->
<div class="drawer-overlay" id="drawer-overlay" onclick="window.closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="drawer-title">🏫 メニュー</div>
    <div class="drawer-user" id="drawer-username">---</div>
  </div>
  <div class="drawer-section">
    <div class="drawer-label">表示形式</div>
    <div class="mode-row">
      <button id="mode-toggle-btn" class="mode-btn active" onclick="window.setViewMode('toggle')">📱 トグル</button>
      <button id="mode-a3-btn" class="mode-btn" onclick="window.setViewMode('a3')">📄 A3印刷</button>
    </div>
  </div>
  <div class="drawer-section scrollable">
    <div class="drawer-label">園一覧 <span style="font-weight:400;font-size:9px;opacity:.6;">↑↓で並び替え</span></div>
    <div id="drawer-school-list"></div>
  </div>
  <div class="drawer-section">
    <div class="dark-mode-row">
      <button class="drawer-item" style="cursor:default;pointer-events:none;">🌙 ダークモード</button>
      <label class="toggle-switch">
        <input type="checkbox" id="dark-mode-toggle" onchange="window.toggleDarkMode(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="drawer-item" onclick="window.handleLogout()">🚪 ログアウト / 終了</button>
  </div>
  <!-- 試用モード時のみ表示 -->
  <div id="drawer-upgrade-section" class="upgrade-section" style="display:none;">
    <a href="https://example.com/upgrade" class="upgrade-banner" target="_blank">
      🌟 有料版にアップグレード<br><span style="font-size:10px;font-weight:400;">3園以上・クラウド保存・全機能</span>
    </a>
  </div>
</div>

<!-- ===== APP HEADER ===== -->
<div id="app-header" class="app-header">
  <div class="header-row">
    <button class="hamburger-btn" onclick="window.openDrawer()">☰</button>
    <span class="app-title">🏫 保育園見学チェックリスト</span>
    <div id="sync-status">接続中...</div>
  </div>
  <div class="school-tabs" id="school-tabs"></div>
</div>

<div class="main" id="main-content">
  <div class="empty-state">
    <div class="empty-icon">🏫</div>
    <div class="empty-text">上の「＋ 園を追加」から<br>見学する園を登録してください</div>
  </div>
</div>

<div class="export-area">
  <button class="export-btn btn-expand"   onclick="window.expandAll()">📂 全展開</button>
  <button class="export-btn btn-collapse" onclick="window.collapseAll()">📁 全縮小</button>

// ─── SPARSE DATA: 入力済み項目のみ保存 ─────────────────────
function serializeData(data) {
  // 入力済み項目のみ保存。note は全タイプで保持対象。
  // ※ 空になった項目はエントリ自体を省くことでFirestore上からも消える
  const sparse = {};
  for (const [key, val] of Object.entries(data)) {
    if (!val) continue;
    const entry = {};
    let hasContent = false;
    if ((val.stars ?? 0) > 0)             { entry.stars = val.stars; hasContent = true; }
    if (val.value?.trim())                { entry.value = val.value; hasContent = true; }
    if (val.selected?.length > 0)         { entry.selected = val.selected; hasContent = true; }
    if (val.ageData && Object.values(val.ageData).some(v => v?.trim())) {
                                            entry.ageData = val.ageData; hasContent = true; }
    if (val.note?.trim())                 { entry.note = val.note; hasContent = true; }
    if (hasContent) sparse[key] = entry;
  }
  return sparse;
}

function deserializeData(sparse) {
  // DBのスパースデータ → 全項目を持つ完全なデータ（未登録項目は空扱い）
  const full = makeEmptyData();
  for (const [key, val] of Object.entries(sparse || {})) {
    if (full[key] !== undefined) full[key] = val;
  }
  return full;
}

function renderDrawerSchoolList() {

  if (!el) return;

  el.innerHTML = schools.map((s, i) =>
    `<div class="drawer-school-row">

      <button class="sort-btn" onclick="window.moveSchool('${escJ(s.id)}',-1)" ${i===0?'disabled':''} title="上へ">↑</button>
      <button class="sort-btn" onclick="window.moveSchool('${escJ(s.id)}',1)"  ${i===n-1?'disabled':''} title="下へ">↓</button>

  `<div class="drawer-school-item drawer-add-btn" onclick="window.openModal();window.closeDrawer();">＋ 園を追加</div>`;
}

// ─── SCHOOL ORDER ──────────────────────────────────────────
window.moveSchool = function(id, dir) {
  const idx = schools.findIndex(s => s.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= schools.length) return;
  [schools[idx], schools[newIdx]] = [schools[newIdx], schools[idx]];
  saveSchoolOrder();
  renderTabs();
  renderDrawerSchoolList();
};

async function saveSchoolOrder() {
  if (trialMode) {
    // LocalStorage: metaを更新するだけで順序が保存される
    trialSaveMeta();
    return;
  }
  if (!currentUser) return;
  // Firebase: 各ドキュメントにorderフィールドを書き込む
  schools.forEach(async (s, i) => {
    try {
      await setDoc(doc(db, "users", currentUser.uid, "checklists", s.id),
        { order: i }, { merge: true });
    } catch(e) { console.error(e); }
  });
}

// ─── LOCALSTRAGE（試用モード用）──────────────────────────
function trialSaveMeta() {
  const meta = schools.map((s, i) => ({ id: s.id, name: s.name, date: s.date || '', order: i }));
  localStorage.setItem(LS_SCHOOLS_KEY, JSON.stringify(meta));
}

function trialSaveData(id) {
  const s = schools.find(x => x.id === id);
  if (!s) return;
  // スパースデータとして保存
  localStorage.setItem(LS_DATA_PREFIX + id, JSON.stringify(serializeData(s.data)));
}

function trialLoadData() {
  try {
    const meta = JSON.parse(localStorage.getItem(LS_SCHOOLS_KEY) || '[]');
    schools = meta.sort((a,b)=>(a.order||0)-(b.order||0)).map(m => {
      const sparse = JSON.parse(localStorage.getItem(LS_DATA_PREFIX + m.id) || '{}');
      return { id: m.id, name: m.name, date: m.date || '', data: deserializeData(sparse) };
    });
    currentId = schools.length > 0 ? schools[0].id : null;
  } catch(e) {
    schools = []; currentId = null;
  }
  renderAll();
}

function trialScheduleSave(id) {
  statusEl.textContent = "保存中...";
  statusEl.className = "status-saving";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    trialSaveMeta();
    trialSaveData(id);
    statusEl.textContent = "お試しモード";
    statusEl.className = "status-trial";
  }, 400);
}

// ─── FIREBASE SYNC ─────────────────────────────────────────
function bindRealtimeSync() {
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  if(!currentUser || !currentId) return;
  const docRef = doc(db, "users", currentUser.uid, "checklists", currentId);
  unsubscribeSnapshot = onSnapshot(docRef, (snapshot) => {
    if (snapshot.exists() && snapshot.metadata.hasPendingWrites === false) {
      const serverData = snapshot.data();
      const sc = schools.find(x => x.id === currentId);
      if(sc) {
        sc.name = serverData.name || sc.name;
        sc.date = serverData.date || "";
        // スパースデータを完全データに復元
        sc.data = deserializeData(serverData.data);
        renderMain();
        renderTabs();
      }
      statusEl.textContent = "同期済";
      statusEl.className = "status-saved";
    }
  });
}

async function firebaseLoadData() {
  if(!currentUser) return;
  statusEl.textContent = "読込中...";
  try {
    const qSnap = await getDocs(collection(db, "users", currentUser.uid, "checklists"));
    schools = [];
    qSnap.forEach(docSnap => {
      const d = docSnap.data();
      schools.push({
        id: docSnap.id,
        name: d.name || docSnap.id,
        date: d.date || "",
        order: d.order ?? 99999,
        // スパースデータを完全データに復元
        data: deserializeData(d.data)
      });
    });
    // orderフィールドで並べ替え
    schools.sort((a, b) => a.order - b.order);
    currentId = schools.length > 0 ? schools[0].id : null;
    renderAll();
    if(currentId) bindRealtimeSync();
  } catch(e) { console.error(e); }
}

function scheduleSave(id) {
  if (trialMode) { trialScheduleSave(id); return; }
  statusEl.textContent = "保存中...";
  statusEl.className = "status-saving";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const s = schools.find(x=>x.id===id);
    if (!s || !currentUser) return;
    try {
      // スパースデータのみFirestoreに送る（容量効率化）
      // ※ merge:true を使わずドキュメント全体を上書きすることで、
      //    全チェックを外した際にFirestore上のフィールドも確実に削除される
      await setDoc(doc(db, "users", currentUser.uid, "checklists", id), {
        name: s.name,
        date: s.date || "",
        order: s.order ?? 0,
        data: serializeData(s.data)
      });
      statusEl.textContent = "同期済";
      statusEl.className = "status-saved";
    } catch(e) {
      statusEl.textContent = "保存失敗";
      statusEl.className = "";
    }
  }, 400);
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    trialMode = false;
    currentUser = user;
    loginOverlay.style.display = 'none';
    document.getElementById('drawer-username').textContent = user.displayName || user.email;
    document.getElementById('drawer-upgrade-section').style.display = 'none';
    firebaseLoadData();
  } else {
    currentUser = null;
    if (!trialMode) {
      loginOverlay.style.display = 'flex';
      if(unsubscribeSnapshot) unsubscribeSnapshot();
    }
  }
});

// ─── DATA ──────────────────────────────────────────────────
function makeEmptyData() {
  const d = {};
  for (const sec of SECTIONS) {
    for (const row of sec.rows) {
      // すべてのタイプに note:"" を含める（全項目にメモ欄を追加するため）
      if (row.type === "stars")    d[row.id] = {stars:0, note:""};
      else if (row.type === "agegroup") d[row.id] = {ageData:{}, note:""};
      else if (["text","textarea","time"].includes(row.type)) d[row.id] = {value:"", note:""};
      else d[row.id] = {selected:[], note:""};
    }
  }
  return d;
}

function currentSchool() { return schools.find(s=>s.id===currentId); }

// ─── SCHOOL MANAGEMENT ─────────────────────────────────────
window.openModal = function() {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-input").value = "";
  setTimeout(() => document.getElementById("modal-input").focus(), 50);
};
window.closeModal = function() { document.getElementById("modal").style.display = "none"; };

window.addSchool = async function() {
  const name = document.getElementById("modal-input").value.trim();
  if (!name) return;

  // 試用モード：2園制限チェック
  if (trialMode) {
    if (schools.length >= TRIAL_MAX) {
      window.closeModal();
      if (confirm(`無料版では${TRIAL_MAX}園までです。\n有料版にアップグレードすると無制限に登録できます。\n有料版のページを開きますか？`)) {
        window.open(UPGRADE_URL, '_blank');
      }
      return;
    }
    if (schools.some(s => s.id === name)) { alert("同名の園がすでに存在します。"); return; }
    const id = name;
    const school = { id, name, date:"", data: makeEmptyData() };
    schools.push(school);
    currentId = id;
    window.closeModal();
    trialSaveMeta();
    trialSaveData(id);
    renderAll();
    return;
  }

  // Firebaseモード
  if (!currentUser) return;
  if (schools.some(s => s.id === name)) { alert("同名の園がすでに存在します。"); return; }
  const id = name;
  const school = { id, name, date:"", data: makeEmptyData() };
  schools.push(school);
  currentId = id;
  window.closeModal();
  try {
    // 新規作成時はスパースデータ（空 = {}）
    await setDoc(doc(db, "users", currentUser.uid, "checklists", id),
      { name, date: "", data: {}, order: schools.length - 1 });
    renderAll();
    bindRealtimeSync();
  } catch(e) { console.error(e); }
};

window.deleteSchool = async function(id) {
  if (!confirm(`「${schools.find(s=>s.id===id)?.name}」を削除しますか？`)) return;

  if (trialMode) {
    localStorage.removeItem(LS_DATA_PREFIX + id);
    schools = schools.filter(s=>s.id!==id);
    if (currentId === id) currentId = schools.length > 0 ? schools[0].id : null;
    trialSaveMeta();
    renderAll();
    return;
  }

  if(!currentUser) return;
  try { await deleteDoc(doc(db, "users", currentUser.uid, "checklists", id)); } catch(e){ console.error(e); }
  schools = schools.filter(s=>s.id!==id);
  if (currentId === id) currentId = schools.length > 0 ? schools[0].id : null;
  renderAll();
  if(currentId) bindRealtimeSync();
};

window.switchSchool = function(id) {
  currentId = id;
  renderMain();
  renderTabs();
  if (!trialMode) bindRealtimeSync();
};

window.handleSchoolNameChange = async function(oldId, newName) {
  newName = newName.trim();
  if (!newName || oldId === newName) return;
  if (schools.some(s => s.id === newName)) { alert("その園名はすでに使用されています。"); renderMain(); return; }

  if (trialMode) {
    // LocalStorage: 旧キーを削除、新キーで保存
    const sc = schools.find(s => s.id === oldId);
    if (!sc) return;
    localStorage.removeItem(LS_DATA_PREFIX + oldId);
    sc.id = newName; sc.name = newName;
    currentId = newName;
    trialSaveMeta();
    trialSaveData(newName);
    renderAll();
    return;
  }

  if (!currentUser) return;
  statusEl.textContent = "園名変更中...";
  statusEl.className = "status-saving";
  try {
    const oldDocRef = doc(db, "users", currentUser.uid, "checklists", oldId);
    const newDocRef = doc(db, "users", currentUser.uid, "checklists", newName);
    const oldSnap = await getDoc(oldDocRef);
    if (oldSnap.exists()) {
      await setDoc(newDocRef, { ...oldSnap.data(), name: newName, updatedAt: new Date() });
      await deleteDoc(oldDocRef);
      const idx = schools.findIndex(s => s.id === oldId);
      if (idx !== -1) { schools[idx].id = newName; schools[idx].name = newName; }
      currentId = newName;
      renderAll();
      bindRealtimeSync();
    }
  } catch(e) { alert("名前の変更に失敗しました。"); renderMain(); }
};

// ─── FIELD UPDATES ─────────────────────────────────────────
// 🔧 修正：見学日をFirebaseに即時保存するよう追加
window.updateSchoolMeta = function(field, value) {
  const sc = currentSchool(); if (!sc) return;
  sc[field] = value;
  scheduleSave(currentId);
};

window.toggleChip = function(secId, rowId, opt) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {selected:[],note:""};
  const sel = d.selected || [];
  sc.data[rowId] = {...d, selected: sel.includes(opt) ? sel.filter(o=>o!==opt) : [...sel,opt]};
  scheduleSave(currentId);
  const sec = SECTIONS.find(s=>s.id===secId);
  const col = COLOR_MAP[sec.c];
  document.querySelectorAll(`[data-row="${rowId}"] .chip`).forEach(el => {
    const isSelected = sc.data[rowId].selected.includes(el.dataset.opt);
    el.className = "chip" + (isSelected ? " selected" : "");
    el.style.background = isSelected ? col.color : "#fff";
    el.style.color = isSelected ? "#fff" : col.color;
  });
  updateProgress(secId);
};

window.updateTextField = function(rowId, value) {
  const sc = currentSchool(); if (!sc) return;
  // note を上書きしないよう既存の note を引き継ぐ
  const prevNote = sc.data[rowId]?.note || "";
  sc.data[rowId] = {value, note: prevNote};
  scheduleSave(currentId);
  updateProgress(SECTIONS.find(sec=>sec.rows.some(r=>r.id===rowId))?.id);
};

window.updateNote = function(rowId, note) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {};
  sc.data[rowId] = {...d, note};
  scheduleSave(currentId);
  // メモボタンの色をメモ有無で切り替え
  const btn = document.getElementById('memo-btn-' + rowId);
  if (btn) btn.classList.toggle('has-note', !!note.trim());
};

window.setStars = function(secId, rowId, n, highlight) {
  const sc = currentSchool(); if (!sc) return;
  sc.data[rowId] = {stars: sc.data[rowId]?.stars === n ? 0 : n};
  scheduleSave(currentId);
  const col = highlight ? "#e65100" : "#f59e0b";
  document.querySelectorAll(`[data-row="${rowId}"] .star-btn`).forEach((el,i) => {
    el.style.color = (i < sc.data[rowId].stars) ? col : "#ddd";
  });
  updateProgress(secId);
};

window.updateAgeGroup = function(rowId, cls, value) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {ageData:{}};
  if(!d.ageData) d.ageData = {};
  d.ageData[cls] = value;
  sc.data[rowId] = d;
  scheduleSave(currentId);
  updateProgress(SECTIONS.find(sec=>sec.rows.some(r=>r.id===rowId))?.id);
};

// ─── PROGRESS ──────────────────────────────────────────────
function calcProgress(secId) {
  const sc = currentSchool(); if (!sc) return {filled:0, total:0};
  const sec = SECTIONS.find(s=>s.id===secId); if (!sec) return {filled:0,total:0};
  let filled=0, total=sec.rows.length;
  for (const row of sec.rows) {
    const d = sc.data?.[row.id];
    if (!d) continue;
    if (row.type==="stars" && (d.stars||0)>0) filled++;
    else if (["text","textarea","time"].includes(row.type) && d.value?.trim()) filled++;
    else if (row.type==="agegroup" && d.ageData && Object.values(d.ageData).some(v=>v?.trim())) filled++;
    else if (!row.type && (d.selected?.length>0||d.note?.trim())) filled++;
  }
  return {filled, total};
}

function updateProgress(secId) {
  if (!secId) return;
  const {filled, total} = calcProgress(secId);
  const pct = total>0 ? (filled/total*100) : 0;
  const bar = document.querySelector(`[data-sec="${secId}"] .progress-fill`);
  const tag = document.querySelector(`[data-sec="${secId}"] .progress-tag`);
  if (bar) bar.style.width = pct + "%";
  if (tag) tag.textContent = `${filled}/${total}`;
}

// ─── SECTION TOGGLE ────────────────────────────────────────
window.toggleSection = function(secId) {
  if (currentViewMode === 'a3') return;
  openSections[secId] = !openSections[secId];

  if (hdr)   hdr.className = "section-header" + (openSections[secId]?" open":"");
};

window.expandAll = function() {
  for (const s of SECTIONS) if (!openSections[s.id]) window.toggleSection(s.id);
};

window.collapseAll = function() {
  for (const s of SECTIONS) if (openSections[s.id]) window.toggleSection(s.id);
};

  if(!cont) return;
  let html = schools.map(s =>
    `<button class="tab-btn ${s.id===currentId?'active':'inactive'}" onclick="window.switchSchool('${escJ(s.id)}')">${escH(s.name)}</button>`
  ).join("");

function renderSchoolHeader(sc) {
  return `
  <div class="school-header">
    <div class="school-name-row">
      <input class="school-name-input" value="${escH(sc.name)}" placeholder="園名"
        onchange="window.handleSchoolNameChange('${escJ(sc.id)}', this.value)" maxlength="30">
      <button class="delete-btn" onclick="window.deleteSchool('${escJ(sc.id)}')" title="この園を削除">🗑</button>
    </div>
    <div class="date-row">
      📅 見学日：
      <input type="date" class="date-input" value="${sc.date||''}"

// ─── MEMO TOGGLE (DOM-only, no re-render) ──────────────────
window.toggleNote = function(rowId) {
  const wrap = document.getElementById('note-wrap-' + rowId);
  if (!wrap) return;
  // メモ欄に内容がある場合は閉じない
  const input = wrap.querySelector('input');
  if (input && input.value.trim()) { wrap.style.display = 'block'; return; }
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
};

function renderRow(row, sc, col) {
  const d = sc.data?.[row.id] || {};
  const existingNote = d.note?.trim() || "";
  const noteVisible  = !!existingNote;
  const hasNoteClass = existingNote ? ' has-note' : '';

  // ── メモブロック（note-wrap）は全タイプ共通 ──
  const noteWrap = `<div id="note-wrap-${row.id}" class="note-wrap" style="${noteVisible?'display:block':'display:none'}">
      <input class="note-input" value="${escH(existingNote)}" placeholder="${escH(row.np||'メモを入力...')}"
        style="--sec-color:${col.color}" oninput="window.updateNote('${row.id}',this.value)">
    </div>`;
  const memoBtn = `<button id="memo-btn-${row.id}" class="memo-btn${hasNoteClass}"
      style="--sec-color:${col.color};--sec-bg:${col.bg}"
      onclick="window.toggleNote('${row.id}')">📝</button>`;

  let inner = "";

  if (row.type === "stars") {
    const stars = d.stars||0;
    const starColor = row.highlight ? "#e65100" : "#f59e0b";
    const btns = [1,2,3,4,5].map(n =>
      `<button class="star-btn" style="color:${n<=stars?starColor:'#ddd'}" onclick="window.setStars('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}',${n},${!!row.highlight})">★</button>`
    ).join("");
    // stars行：ボタン群とメモボタンを横並び
    inner = `<div class="input-row"><div class="stars" data-row="${row.id}">${btns}</div>${memoBtn}</div>${noteWrap}`;

  } else if (row.type === "time") {
    inner = `<div class="input-row">
      <input type="time" class="text-input time-input" value="${escH(d.value||'')}"
        oninput="window.updateTextField('${row.id}',this.value)">
      ${memoBtn}</div>${noteWrap}`;

  } else if (row.type === "text") {
    inner = `<div class="input-row">
      <input class="text-input" style="--sec-color:${col.color}" value="${escH(d.value||'')}" placeholder="${escH(row.ph||'')}"
        oninput="window.updateTextField('${row.id}',this.value)">
      ${memoBtn}</div>${noteWrap}`;

  } else if (row.type === "textarea") {
    inner = `<div class="input-row" style="align-items:flex-start">
      <textarea class="textarea" style="--sec-color:${col.color};flex:1;min-width:0" placeholder="${escH(row.ph||'')}"
        oninput="window.updateTextField('${row.id}',this.value)">${escH(d.value||'')}</textarea>
      ${memoBtn}</div>${noteWrap}`;

  } else if (row.type === "agegroup") {
    const ageData = d.ageData || {};
    inner = `<div class="input-row" style="align-items:flex-start">
      <div class="agegroup-grid" style="flex:1">${AGE_CLASSES.map(cls =>
      `<div class="agegroup-item">
        <span class="agegroup-label">${cls}</span>
        <input class="agegroup-input" value="${escH(ageData[cls]||'')}" placeholder="○"
          oninput="window.updateAgeGroup('${row.id}','${cls}',this.value)">
      </div>`
    ).join("")}</div>${memoBtn}</div>${noteWrap}`;

  } else {
    // チップ：メモボタンをチップ末尾に inline
    const chips = (row.opts||[]).map(opt => {
      const sel = (d.selected||[]).includes(opt);
      return `<button class="chip ${sel?'selected':''}" data-opt="${escH(opt)}"
        style="border-color:${col.color};background:${sel?col.color:'#fff'};color:${sel?'#fff':col.color}"
        onclick="window.toggleChip('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}','${escJ(opt)}')">${escH(opt)}</button>`;
    }).join("");
    inner = `<div class="chips-row" data-row="${row.id}">${chips}${memoBtn}</div>${noteWrap}`;
  }

  const badge = row.b==="重要" ? `<span class="badge badge-req">重要</span>` :
                row.b==="事前" ? `<span class="badge badge-pre">事前</span>` : "";
  return `
    <div class="row" data-row="${row.id}">
      <div class="row-label">${badge}<span class="label-text">${escH(row.l)}</span></div>
      ${inner}
    </div>`;
}

function renderSection(sec, sc) {
  const col = COLOR_MAP[sec.c];
  const {filled,total} = calcProgress(sec.id);
  const pct = total>0?(filled/total*100):0;
  const isOpen = currentViewMode === 'a3' ? true : !!openSections[sec.id];
  const rows = sec.rows.map(r => renderRow(r, sc, col)).join("");
  return `
  <div class="section" data-sec="${sec.id}">
    <button class="section-header ${isOpen?'open':''}" style="--sec-color:${col.color};--sec-bg:${col.bg}" onclick="window.toggleSection('${sec.id}')">
      <span class="section-title" style="color:${col.color}">${sec.e} ${sec.n?sec.n+' ':''}${escH(sec.t)}<span class="progress-tag">${filled}/${total}</span></span>
      <span class="section-arrow ${isOpen?'open':''}">${isOpen?'▲':'▼'}</span>
    </button>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col.color}"></div></div>
    <div class="section-body" style="${isOpen?'':'display:none'}">
      ${rows}
    </div>
  </div>`;
}

function renderMain() {
  const cont = document.getElementById("main-content");
  if(!cont) return;
  const sc = currentSchool();
  if (!sc) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">🏫</div><div class="empty-text">上の「＋ 園を追加」から<br>見学する園を登録してください</div></div>`;
    return;
  }
  let html = renderSchoolHeader(sc);
  if(currentViewMode === 'a3') html += '<div class="main-container-grid">';
  html += SECTIONS.map(sec => renderSection(sec, sc)).join("");
  if(currentViewMode === 'a3') html += '</div>';
  cont.innerHTML = html;
}

function renderAll() { renderTabs(); renderMain(); }

window.exportSummary = function() {
  const sc = currentSchool();
  if (!sc) { alert("園が選択されていません"); return; }
  let txt = `【${sc.name}】見学まとめ\n`;
  if (sc.date) txt += `見学日：${sc.date}\n`;
  txt += "\n";
  for (const sec of SECTIONS) {
    let secTxt = "";
    for (const row of sec.rows) {
      const d = sc.data?.[row.id]||{};
      if (row.type==="stars") {
        if (d.stars>0) secTxt += `  ${row.l}：${"★".repeat(d.stars)}${"☆".repeat(5-d.stars)}\n`;
      } else if (["text","textarea","time"].includes(row.type)) {
        if (d.value?.trim()) secTxt += `  ${row.l}：${d.value}\n`;
      } else if (row.type==="agegroup") {
        const parts = AGE_CLASSES.filter(c=>d.ageData?.[c]?.trim()).map(c=>`${c}:${d.ageData[c]}`);
        if (parts.length>0) secTxt += `  ${row.l}：${parts.join(" / ")}\n`;
      } else {
        const parts = [];
        if (d.selected?.length>0) parts.push(d.selected.join("・"));
        if (d.note?.trim()) parts.push(`(${d.note})`);
        if (parts.length>0) secTxt += `  ${row.l}：${parts.join(" ")}\n`;
      }
    }
    if (secTxt) txt += `${sec.e}${sec.n?sec.n+" ":""}${sec.t}\n${secTxt}\n`;
  }
  navigator.clipboard.writeText(txt).then(()=>{
    alert("クリップボードにコピーしました！\nメモアプリやLINEに貼り付けてご利用ください📋");
  }).catch(()=>{
    prompt("テキストをコピーしてください:", txt);
  });
};

function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escJ(s) { return String(s).replace(/'/g,"\\'"); }

// Service Workerの登録（電波がないときのリロード対策）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
