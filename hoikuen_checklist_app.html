<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>保育園見学チェックリスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --blue:#1e5a8c;--blue-bg:#eef5fc;
    --green:#2e7d32;--green-bg:#edf7ee;
    --red:#c62828;--red-bg:#fdf2f2;
    --orange:#e65100;--orange-bg:#fdf7ef;
    --yellow:#7a6800;--yellow-bg:#fffae6;
    --pink:#c2185b;--pink-bg:#fce4ec;
    --gray:#555;--gray-bg:#f5f5f5;
    --surface:#fff;--bg:#f2f4f7;
    --text:#222;--sub:#666;--border:#e4e7ec;
    --radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* ===== HEADER ===== */
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 8px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,0.07);}
  .app-title{font-size:13px;font-weight:700;color:#333;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .school-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .school-tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
  .tab-btn.active{background:var(--blue);color:#fff;font-weight:700;}
  .tab-btn.inactive{background:#e8ecf0;color:#555;font-weight:500;}
  .tab-add{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px dashed #aaa;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:inherit;}
  .tab-add:hover{border-color:#666;color:#555;}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
  .modal-input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s;}
  .modal-input:focus{border-color:var(--blue);}
  .modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
  .btn-cancel{padding:9px 18px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;}
  .btn-primary{padding:9px 18px;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}

  /* ===== MAIN CONTENT ===== */
  .main{padding:12px 12px 90px;}
  .school-header{background:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .school-name-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .school-name-input{flex:1;font-size:17px;font-weight:700;border:none;border-bottom:2px solid #e0e0e0;padding:4px 0;outline:none;font-family:inherit;background:transparent;color:var(--text);transition:border .2s;}
  .school-name-input:focus{border-color:var(--blue);}
  .delete-btn{background:none;border:none;color:#e57373;font-size:22px;cursor:pointer;padding:2px;flex-shrink:0;}
  .date-row{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:13px;}
  .date-input{border:none;border-bottom:1px solid #ddd;font-size:13px;color:#444;outline:none;font-family:inherit;background:transparent;padding:2px 0;}

  /* ===== SECTION ===== */
  .section{background:#fff;border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
  .section-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border:none;cursor:pointer;text-align:left;background:var(--surface);transition:background .2s;font-family:inherit;}
  .section-header.open{background:var(--sec-bg);}
  .section-title{font-weight:700;font-size:13px;color:var(--sec-color);}
  .section-arrow{font-size:12px;color:#bbb;transition:transform .2s;}
  .section-arrow.open{transform:rotate(180deg);}
  .section-body{border-top:2px solid var(--sec-bg);}
  .progress-bar{height:3px;background:#f0f0f0;margin:0 15px 0;}
  .progress-fill{height:3px;border-radius:2px;background:var(--sec-color);transition:width .3s;}

  /* ===== ROWS ===== */
  .row{padding:11px 14px;border-bottom:1px solid #f2f2f4;}
  .row:last-child{border-bottom:none;}
  .row-label{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
  .badge{font-size:9px;padding:2px 5px;border-radius:4px;color:#fff;font-weight:700;flex-shrink:0;}
  .badge-req{background:#e65100;}
  .badge-pre{background:#1e5a8c;}
  .label-text{font-size:12px;font-weight:600;color:#444;}

  /* ===== CHIPS ===== */
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{padding:6px 12px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid var(--sec-color);background:#fff;color:var(--sec-color);font-weight:500;transition:all .15s;-webkit-user-select:none;}
  .chip.selected{background:var(--sec-color);color:#fff;font-weight:700;}
  .chip:active{opacity:0.7;transform:scale(0.96);}

  /* ===== INPUTS ===== */
  .text-input{width:100%;padding:8px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;color:var(--text);}
  .text-input:focus{border-color:var(--sec-color);}
  .note-input{margin-top:7px;width:100%;padding:7px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;font-family:inherit;outline:none;color:#555;background:#fafafa;}
  .note-input:focus{border-color:var(--sec-color);background:#fff;}
  .textarea{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:100px;transition:border .2s;}
  .textarea:focus{border-color:var(--sec-color);}

  /* ===== STARS ===== */
  .stars{display:flex;gap:6px;}
  .star-btn{background:none;border:none;cursor:pointer;font-size:30px;padding:2px;line-height:1;transition:color .1s, transform .1s;}
  .star-btn:active{transform:scale(0.85);}
  .star-filled{color:#f59e0b;}
  .star-empty{color:#ddd;}
  .star-filled.highlight{color:#e65100;}

  /* ===== EMPTY STATE ===== */
  .empty-state{padding:60px 20px;text-align:center;color:#aaa;}
  .empty-icon{font-size:56px;margin-bottom:12px;}
  .empty-text{font-size:14px;line-height:1.6;}

  /* ===== PROGRESS TAG ===== */
  .progress-tag{font-size:10px;color:var(--sec-color);opacity:.7;margin-left:6px;font-weight:500;}

  /* ===== EXPORT BTN ===== */
  .export-area{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;}
  .export-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-export{background:var(--green);color:#fff;}
  .btn-expand{background:var(--blue-bg);color:var(--blue);}
</style>
</head>
<body>

<div id="app-header" class="app-header">
  <div class="app-title">🏫 保育園見学チェックリスト</div>
  <div class="school-tabs" id="school-tabs"></div>
</div>

<div class="main" id="main-content">
  <div class="empty-state">
    <div class="empty-icon">🏫</div>
    <div class="empty-text">下の「＋ 園を追加」から<br>見学する園を登録してください</div>
  </div>
</div>

<div class="export-area">
  <button class="export-btn btn-expand" onclick="expandAll()">📂 全セクション展開</button>
  <button class="export-btn btn-export" onclick="exportSummary()">📋 サマリーコピー</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">🏫 園を追加</div>
    <input class="modal-input" id="modal-input" placeholder="例：○○保育園" maxlength="30"
      oninput="" onkeydown="if(event.key==='Enter')addSchool()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="addSchool()">追加する</button>
    </div>
  </div>
</div>

      {id:"r111",l:"代理送迎の可否",opts:["可","不可"],hasNote:true,np:"条件"},
      {id:"r112",l:"登園基準(発熱等)",opts:["明確説明有","不明確"]},
      {id:"r113",l:"休園基準",opts:["明確説明有","不明確"]},
    ]},
  { id:"s11", e:"🎒", n:"⑪", t:"持ち物・保護者負担", c:"orange",
    rows:[
      {id:"r114",l:"毎日の持ち物量",opts:["少ない","普通","多い"]},
      {id:"r115",l:"おむつサブスク",b:"重要",opts:["サブスク有","持参(記名)","持参(スタンプ可)"]},
      {id:"r116",l:"布団リース有無",opts:["リース有","持参","園用意"]},
      {id:"r117",l:"洗濯頻度・予洗い",type:"text",ph:"週○回 / 予洗い有無"},
      {id:"r118",l:"名前付けの負担",opts:["少ない","普通","多い"]},
      {id:"r119",l:"手作り品の有無",opts:["あり","なし"],hasNote:true,np:"内容"},
      {id:"r120",l:"行事準備の負担",opts:["少ない","普通","多い"]},
    ]},
  { id:"s12", e:"💰", n:"⑫", t:"費用", c:"green",
    rows:[
      {id:"r121",l:"保育料",type:"text",ph:"¥ /月"},
      {id:"r122",l:"延長保育料",type:"text",ph:"¥ /月"},
      {id:"r123",l:"給食費",type:"text",ph:"¥ /月"},
      {id:"r124",l:"教材費",type:"text",ph:"¥ /月"},
      {id:"r125",l:"行事費",type:"text",ph:"¥ /年"},
      {id:"r126",l:"入園時費用",type:"text",ph:"¥"},
      {id:"r127",l:"その他追加費用",type:"text",ph:"¥ 内容:"},
      {id:"r128",l:"合計目安(年間)",type:"text",ph:"¥"},
    ]},
  { id:"s13", e:"🏅", n:"⑬", t:"総合評価（タップで選択）", c:"yellow",
    rows:[
      {id:"r129",l:"安全性",type:"stars"},
      {id:"r130",l:"保育内容・方針",type:"stars"},
      {id:"r131",l:"先生の質・雰囲気",type:"stars"},
      {id:"r132",l:"子どもの様子・雰囲気",type:"stars"},
      {id:"r133",l:"通いやすさ・利便性",type:"stars"},
      {id:"r134",l:"コスパ",type:"stars"},
      {id:"r135",l:"直感（預けたいか）",type:"stars"},
      {id:"r136",l:"✨ 総合満足度",type:"stars",highlight:true},
    ]},
  { id:"s14", e:"📝", n:"", t:"自由メモ・推しや懸念点など", c:"gray",
    rows:[
      {id:"r137",l:"メモ欄",type:"textarea",ph:"気になった点、良かった点、懸念点など自由に記入..."},
    ]},
];

const COLOR_MAP = {
  blue:{color:"var(--blue)",bg:"var(--blue-bg)"},
  green:{color:"var(--green)",bg:"var(--green-bg)"},
  red:{color:"var(--red)",bg:"var(--red-bg)"},
  orange:{color:"var(--orange)",bg:"var(--orange-bg)"},
  yellow:{color:"var(--yellow)",bg:"var(--yellow-bg)"},
  pink:{color:"var(--pink)",bg:"var(--pink-bg)"},
  gray:{color:"var(--gray)",bg:"var(--gray-bg)"},
};

// ============ STATE ============
let schools = [];
let currentId = null;
let openSections = {};
let saveTimer = null;

// ============ STORAGE ============
async function loadData() {
  try {
    const r = await window.storage.get("hk_schools_meta");
    if (r) schools = JSON.parse(r.value);
  } catch(e) { schools = []; }
  if (schools.length > 0) currentId = schools[0].id;
  // Load each school's data
  for (const s of schools) {
    try {
      const r = await window.storage.get("hk_data_" + s.id);
      if (r) s.data = JSON.parse(r.value);
    } catch(e) { s.data = makeEmptyData(); }
    if (!s.data) s.data = makeEmptyData();
  }
}

async function saveMeta() {
  const meta = schools.map(s => ({id:s.id,name:s.name,date:s.date||""}));
  try { await window.storage.set("hk_schools_meta", JSON.stringify(meta)); } catch(e){}
}

async function saveSchoolData(id) {
  const s = schools.find(x=>x.id===id);
  if (!s) return;
  try { await window.storage.set("hk_data_" + id, JSON.stringify(s.data)); } catch(e){}
}

function scheduleSave(id) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSchoolData(id), 600);
}

// ============ DATA ============
function makeEmptyData() {
  const d = {};
  for (const sec of SECTIONS) {
    for (const row of sec.rows) {
      if (row.type === "stars") d[row.id] = {stars:0};
      else if (row.type === "text" || row.type === "textarea") d[row.id] = {value:""};
      else d[row.id] = {selected:[],note:""};
    }
  }
  return d;
}

function currentSchool() { return schools.find(s=>s.id===currentId); }

// ============ SCHOOL MANAGEMENT ============
function openModal() {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-input").value = "";
  setTimeout(() => document.getElementById("modal-input").focus(), 50);
}
function closeModal() { document.getElementById("modal").style.display = "none"; }

async function addSchool() {
  const name = document.getElementById("modal-input").value.trim();
  if (!name) return;
  const id = "s_" + Date.now();
  const school = {id, name, date:"", data: makeEmptyData()};
  schools.push(school);
  currentId = id;
  closeModal();
  await saveMeta();
  await saveSchoolData(id);
  renderAll();
}

async function deleteSchool(id) {
  if (!confirm(`「${schools.find(s=>s.id===id)?.name}」を削除しますか？\n（入力済みのデータも消えます）`)) return;
  try { await window.storage.delete("hk_data_" + id); } catch(e){}
  schools = schools.filter(s=>s.id!==id);
  if (currentId === id) currentId = schools.length > 0 ? schools[0].id : null;
  await saveMeta();
  renderAll();
}

function switchSchool(id) {
  currentId = id;
  renderMain();
  renderTabs();
}

// ============ FIELD UPDATES ============
function toggleChip(secId, rowId, opt) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {selected:[],note:""};
  const sel = d.selected || [];
  sc.data[rowId] = {...d, selected: sel.includes(opt) ? sel.filter(o=>o!==opt) : [...sel,opt]};
  scheduleSave(currentId);
  // Update chip visually
  const sec = SECTIONS.find(s=>s.id===secId);
  const col = COLOR_MAP[sec.c];
  document.querySelectorAll(`[data-row="${rowId}"] .chip`).forEach(el => {
    const isSelected = sc.data[rowId].selected.includes(el.dataset.opt);
    el.className = "chip" + (isSelected ? " selected" : "");
    el.style.background = isSelected ? col.color : "#fff";
    el.style.color = isSelected ? "#fff" : col.color;
    el.style.borderColor = col.color;
  });
  updateProgress(secId);
}

function updateTextField(rowId, value) {
  const sc = currentSchool(); if (!sc) return;
  sc.data[rowId] = {value};
  scheduleSave(currentId);
  updateProgress(SECTIONS.find(sec=>sec.rows.some(r=>r.id===rowId))?.id);
}

function updateNote(rowId, note) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {selected:[],note:""};
  sc.data[rowId] = {...d, note};
  scheduleSave(currentId);
}

function setStars(secId, rowId, n, highlight) {
  const sc = currentSchool(); if (!sc) return;
  const cur = sc.data[rowId]?.stars || 0;
  sc.data[rowId] = {stars: cur === n ? 0 : n};
  scheduleSave(currentId);
  // Update stars visually
  const col = highlight ? "#e65100" : "#f59e0b";
  document.querySelectorAll(`[data-row="${rowId}"] .star-btn`).forEach((el,i) => {
    el.textContent = "★";
    el.style.color = (i < sc.data[rowId].stars) ? col : "#ddd";
  });
  updateProgress(secId);
}

// ============ PROGRESS ============
function calcProgress(secId) {
  const sc = currentSchool(); if (!sc) return {filled:0, total:0};
  const sec = SECTIONS.find(s=>s.id===secId); if (!sec) return {filled:0,total:0};
  let filled=0, total=sec.rows.length;
  for (const row of sec.rows) {
    const d = sc.data?.[row.id];
    if (!d) continue;
    if (row.type==="stars" && (d.stars||0)>0) filled++;
    else if ((row.type==="text"||row.type==="textarea") && d.value?.trim()) filled++;
    else if (!row.type && (d.selected?.length>0||d.note?.trim())) filled++;
  }
  return {filled, total};
}

function updateProgress(secId) {
  if (!secId) return;
  const {filled, total} = calcProgress(secId);
  const pct = total>0 ? (filled/total*100) : 0;
  const bar = document.querySelector(`[data-sec="${secId}"] .progress-fill`);
  const tag = document.querySelector(`[data-sec="${secId}"] .progress-tag`);
  if (bar) bar.style.width = pct + "%";
  if (tag) tag.textContent = `${filled}/${total}`;
}

// ============ TOGGLE SECTION ============
function toggleSection(secId) {
  openSections[secId] = !openSections[secId];
  const body = document.querySelector(`[data-sec="${secId}"] .section-body`);
  const arrow = document.querySelector(`[data-sec="${secId}"] .section-arrow`);
  const hdr = document.querySelector(`[data-sec="${secId}"] .section-header`);
  if (body) body.style.display = openSections[secId] ? "" : "none";
  if (arrow) { arrow.textContent = openSections[secId] ? "▲" : "▼"; arrow.className = "section-arrow" + (openSections[secId]?" open":""); }
  if (hdr) { hdr.className = "section-header" + (openSections[secId]?" open":""); }
}

function expandAll() {
  for (const s of SECTIONS) if (!openSections[s.id]) toggleSection(s.id);
}

// ============ RENDER ============
function renderTabs() {
  const cont = document.getElementById("school-tabs");
  let html = schools.map(s => `
    <button class="tab-btn ${s.id===currentId?'active':'inactive'}" onclick="switchSchool('${s.id}')">${escH(s.name)}</button>
  `).join("");
  html += `<button class="tab-add" onclick="openModal()">＋ 追加</button>`;
  cont.innerHTML = html;
}

function renderSchoolHeader(sc) {
  return `
  <div class="school-header">
    <div class="school-name-row">
      <input class="school-name-input" value="${escH(sc.name)}" placeholder="園名"
        oninput="updateSchoolMeta('name',this.value)" maxlength="30">
      <button class="delete-btn" onclick="deleteSchool('${sc.id}')" title="この園を削除">🗑</button>
    </div>
    <div class="date-row">
      📅 見学日：
      <input type="date" class="date-input" value="${sc.date||''}"
        onchange="updateSchoolMeta('date',this.value)">
    </div>
  </div>`;
}

function renderRow(row, sc, col) {
  const d = sc.data?.[row.id] || {};
  let inner = "";
  if (row.type === "stars") {
    const stars = d.stars||0;
    const starColor = row.highlight ? "#e65100" : "#f59e0b";
    const btns = [1,2,3,4,5].map(n =>
      `<button class="star-btn" style="color:${n<=stars?starColor:'#ddd'}" onclick="setStars('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}',${n},${!!row.highlight})">★</button>`
    ).join("");
    inner = `<div class="stars">${btns}</div>`;
  } else if (row.type==="text") {
    inner = `<input class="text-input" style="--sec-color:${col.color}" value="${escH(d.value||'')}" placeholder="${escH(row.ph||'')}"
      oninput="updateTextField('${row.id}',this.value)">`;
  } else if (row.type==="textarea") {
    inner = `<textarea class="textarea" style="--sec-color:${col.color}" placeholder="${escH(row.ph||'')}"
      oninput="updateTextField('${row.id}',this.value)">${escH(d.value||'')}</textarea>`;
  } else {
    const chips = (row.opts||[]).map(opt => {
      const sel = (d.selected||[]).includes(opt);
      return `<button class="chip ${sel?'selected':''}" data-opt="${escH(opt)}"
        style="border-color:${col.color};background:${sel?col.color:'#fff'};color:${sel?'#fff':col.color}"
        onclick="toggleChip('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}','${escJ(opt)}')">${escH(opt)}</button>`;
    }).join("");
    const note = row.hasNote ? `<input class="note-input" value="${escH(d.note||'')}" placeholder="${escH(row.np||'メモ')}"
      oninput="updateNote('${row.id}',this.value)">` : "";
    inner = `<div class="chips">${chips}</div>${note}`;
  }

  const badge = row.b==="重要" ? `<span class="badge badge-req">重要</span>` :
                row.b==="事前" ? `<span class="badge badge-pre">事前</span>` : "";
  return `
    <div class="row" data-row="${row.id}">
      <div class="row-label">${badge}<span class="label-text">${escH(row.l)}</span></div>
      ${inner}
    </div>`;
}

function renderSection(sec, sc) {
  const col = COLOR_MAP[sec.c];
  const {filled,total} = calcProgress(sec.id);
  const pct = total>0?(filled/total*100):0;
  const isOpen = !!openSections[sec.id];
  const rows = sec.rows.map(r => renderRow(r, sc, col)).join("");
  return `
  <div class="section" data-sec="${sec.id}">
    <button class="section-header ${isOpen?'open':''}" style="--sec-color:${col.color};--sec-bg:${col.bg}" onclick="toggleSection('${sec.id}')">
      <span class="section-title" style="color:${col.color}">${sec.e} ${sec.n?sec.n+' ':''}${escH(sec.t)}<span class="progress-tag">${filled}/${total}</span></span>
      <span class="section-arrow ${isOpen?'open':''}">${isOpen?'▲':'▼'}</span>
    </button>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col.color}"></div></div>
    <div class="section-body" style="${isOpen?'':'display:none'}">
      ${rows}
    </div>
  </div>`;
}

function renderMain() {
  const cont = document.getElementById("main-content");
  const sc = currentSchool();
  if (!sc) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">🏫</div><div class="empty-text">「＋ 追加」から<br>見学する園を登録してください</div></div>`;
    return;
  }
  let html = renderSchoolHeader(sc);
  html += SECTIONS.map(sec => renderSection(sec, sc)).join("");
  cont.innerHTML = html;
}

function renderAll() { renderTabs(); renderMain(); }

// ============ SCHOOL META UPDATE ============
function updateSchoolMeta(field, value) {
  const sc = currentSchool(); if (!sc) return;
  sc[field] = value;
  saveMeta();
  if (field === "name") renderTabs();
}

// ============ EXPORT ============
function exportSummary() {
  const sc = currentSchool();
  if (!sc) { alert("園が選択されていません"); return; }
  let txt = `【${sc.name}】見学まとめ\n`;
  if (sc.date) txt += `見学日：${sc.date}\n`;
  txt += "\n";
  for (const sec of SECTIONS) {
    let secTxt = "";
    for (const row of sec.rows) {
      const d = sc.data?.[row.id]||{};
      if (row.type==="stars") {
        if (d.stars>0) secTxt += `  ${row.l}：${"★".repeat(d.stars)}${"☆".repeat(5-d.stars)}\n`;
      } else if (row.type==="text"||row.type==="textarea") {
        if (d.value?.trim()) secTxt += `  ${row.l}：${d.value}\n`;
      } else {
        const parts = [];
        if (d.selected?.length>0) parts.push(d.selected.join("・"));
        if (d.note?.trim()) parts.push(`(${d.note})`);
        if (parts.length>0) secTxt += `  ${row.l}：${parts.join(" ")}\n`;
      }
    }
    if (secTxt) txt += `${sec.e}${sec.n?sec.n+" ":""}${sec.t}\n${secTxt}\n`;
  }
  navigator.clipboard.writeText(txt).then(()=>{
    alert("クリップボードにコピーしました！\nメモアプリやLINEに貼り付けてご利用ください📋");
  }).catch(()=>{
    prompt("テキストをコピーしてください:", txt);
  });
}

// ============ UTILS ============
function escH(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escJ(s) { return String(s).replace(/'/g,"\\'"); }

// ============ INIT ============
(async function() {
  await loadData();
  renderAll();
})();
</script>
</body>
</html>
