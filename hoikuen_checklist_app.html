<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>保育園見学チェックリスト・クラウド</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  
  /* ===== ライトモード・ダークモード共通変数 ===== */
  :root{
    --blue:#1e5a8c;--blue-bg:#eef5fc;
    --green:#2e7d32;--green-bg:#edf7ee;
    --red:#c62828;--red-bg:#fdf2f2;
    --orange:#e65100;--orange-bg:#fdf7ef;
    --yellow:#7a6800;--yellow-bg:#fffae6;
    --pink:#c2185b;--pink-bg:#fce4ec;
    --gray:#555;--gray-bg:#f5f5f5;
    --surface:#fff;--bg:#f2f4f7;
    --text:#222;--sub:#666;--border:#e4e7ec;
    --radius:12px;--shadow:0 1px 4px rgba(0,0,0,0.06);
  }

  /* 🌗 ダークモード用の配色スタイル定義 */
  body.dark-theme {
    --bg:#121212;--surface:#1e1e1e;--text:#e0e0e0;--sub:#aaa;--border:#333;
    --blue-bg:#142c42;--green-bg:#163818;--red-bg:#3d1919;--orange-bg:#3d2011;
    --yellow-bg:#383211;--pink-bg:#3d1624;--gray-bg:#2d2d2d;--shadow:0 1px 4px rgba(0,0,0,0.3);
  }

  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;transition: background 0.2s, color 0.2s;}

  /* ===== HEADER (余白をさらに減らしてスリム化) ===== */
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(0,0,0,0.05);}
  .app-title{font-size:12.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
  .school-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none;}
  .school-tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:5px 12px;border-radius:15px;border:none;cursor:pointer;font-size:11.5px;font-family:inherit;transition:all .2s;}
  .tab-btn.active{background:var(--blue);color:#fff;font-weight:700;}
  .tab-btn.inactive{background:var(--border);color:var(--sub);font-weight:500;}
  .tab-add{flex-shrink:0;padding:4px 10px;border-radius:15px;border:1.5px dashed var(--sub);background:transparent;color:var(--sub);font-size:11.5px;cursor:pointer;font-family:inherit;}

  /* ===== ☰ ハンバーガー・左ドロワーメニュー ===== */
  .drawer-toggle { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); padding:4px 6px; display:flex; align-items:center; }
  .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; display:none; }
  .drawer { position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--surface); box-shadow:2px 0 12px rgba(0,0,0,0.15); z-index:1000; display:flex; flex-direction:column; transition: left 0.25s ease; color:var(--text); }
  .drawer-section { padding:14px; border-bottom:1px solid var(--border); }
  .drawer-item-title { font-weight:700; font-size:11px; color:var(--sub); margin-bottom:6px; text-transform:uppercase; }

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1300;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:320px;box-shadow:0 6px 24px rgba(0,0,0,.15);color:var(--text);}
  .modal-title{font-size:14px;font-weight:700;margin-bottom:10px;}
  .modal-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);}

  /* ===== MAIN CONTENT ===== */
  .main{padding:8px 8px 75px;}
  .school-header{background:var(--surface);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
  
  /* 📱スマホ縦持ち時でも枠からはみ出さないインテリジェント・レイアウト */
  .school-name-row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;}
  .school-name-input{flex:1;min-width:0;font-size:16px;font-weight:700;border:none;border-bottom:2px solid var(--border);padding:2px 0;outline:none;font-family:inherit;background:transparent;color:var(--text);transition:border .2s;}
  .school-name-input:focus{border-color:var(--blue);}
  .date-row{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:12px;margin-top:6px;}
  .date-input{border:none;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);outline:none;font-family:inherit;background:transparent;padding:2px 0;}

  /* ===== SECTION ===== */
  .section{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);}
  .section-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:none;cursor:pointer;text-align:left;background:var(--surface);font-family:inherit;}
  .section-header.open{background:var(--sec-bg);}
  .section-title{font-weight:700;font-size:12.5px;color:var(--sec-color);}
  .section-arrow{font-size:11px;color:var(--sub);transition:transform .2s;}
  .section-arrow.open { transform:rotate(180deg); }
  .section-body{border-top:1px solid var(--sec-bg);}
  .progress-bar{height:2.5px;background:var(--border);margin:0 12px;}
  .progress-fill{height:2.5px;border-radius:1px;background:var(--sec-color);transition:width .3s;}

  /* ===== ROWS ===== */
  .row{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;}
  .row:last-child{border-bottom:none;}
  .row-label{display:flex;align-items:center;gap:4px;margin-bottom:5px;}
  .badge{font-size:8.5px;padding:1px 4px;border-radius:4px;color:#fff;font-weight:700;flex-shrink:0;}
  .badge-req{background:var(--orange);}
  .badge-pre{background:var(--blue);}
  .label-text{font-size:12px;font-weight:600;color:var(--text);opacity:0.9;}

  /* ===== CHIPS / INPUTS ===== */
  .chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{padding:4px 11px;border-radius:15px;font-size:11.5px;font-family:inherit;cursor:pointer;border:1.5px solid var(--sec-color);background:var(--surface);color:var(--sec-color);font-weight:500;transition:all .15s;-webkit-user-select:none;}
  .chip.selected{background:var(--sec-color);color:#fff;font-weight:700;}
  .text-input{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;font-family:inherit;outline:none;color:var(--text);background:var(--bg);transition:border .2s;}
  .text-input:focus{border-color:var(--sec-color);}
  .text-input[type="time"] { max-width: 120px; padding: 4px 8px; font-weight: bold; color: var(--blue); }
  .note-input{margin-top:5px;width:100%;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:11.5px;font-family:inherit;outline:none;color:var(--text);background:var(--bg);}
  .textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;font-family:inherit;outline:none;resize:vertical;min-height:70px;color:var(--text);background:var(--bg);}

  /* ===== STARS ===== */
  .star-btn{background:none;border:none;cursor:pointer;font-size:26px;padding:2px;line-height:1;}
  .star-filled{color:#f59e0b;} .star-empty{color:var(--border);} .star-filled.highlight{color:var(--orange);}

  /* ===== BOTTOM EXPAND AREA ===== */
  .export-area{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;z-index:90;}
  body.dark-theme .export-area { background: rgba(30,30,30,0.9); }
  .export-btn{flex:1;padding:9px;border-radius:10px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-export{background:var(--green);color:#fff;}
  .btn-expand{background:var(--blue-bg);color:var(--blue);}
  .btn-collapse{background:var(--gray-bg);color:var(--text);border:1px solid var(--border);}

  /* ===== A3 MODE LAYOUT ===== */
  body.mode-a3 { background:var(--surface); padding: 10px; }
  body.mode-a3 .main { max-width: 100% !important; padding: 5px 0 40px 0; }
  body.mode-a3 .main-container-grid { column-count: 4; column-gap: 12px; width: 100%; }
  body.mode-a3 .section { display: inline-block; width: 100%; break-inside: avoid; page-break-inside: avoid; box-shadow: none; border: 1px solid var(--border); margin-bottom: 10px; }
  body.mode-a3 .section-body { display: block !important; }
  body.mode-a3 .section-arrow, body.mode-a3 .progress-bar, body.mode-a3 .export-area { display: none !important; }

  /* ===== HYBRID AUTH UI ===== */
  #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
  .login-box { background: var(--surface); padding: 30px 24px; border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--border); }
  .login-box h2 { font-size: 16px; color: var(--text); margin-bottom: 4px; font-weight: 700; }
  .login-box p { font-size: 12px; color: var(--sub); margin-bottom: 18px; }
  .login-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; margin-bottom: 8px; background: var(--bg); color: var(--text); }
  .auth-btn-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .google-login-btn { width: 100%; padding: 11px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; }
</style>
</head>
<body>

<div id="login-overlay">

<div id="drawer-overlay" class="drawer-overlay" onclick="window.toggleDrawer(false)">

    </div>
    <div style="padding:12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; background:var(--gray-bg);">
      <button class="google-login-btn" style="background:var(--surface); font-size:11.5px; padding:8px;" onclick="window.toggleTheme()">🌓 テーマ切り替え (明/暗)</button>
      <button class="email-link-btn" style="background:var(--red); color:white; border:none; padding:8px; border-radius:8px; font-weight:700; cursor:pointer; font-size:11.5px;" onclick="window.handleLogout(); window.toggleDrawer(false);">ログアウト</button>
    </div>
  </div>
</div>

<div id="app-header" class="app-header">
  <div style="display:flex; align-items:center; justify-content:space-between; width:100%; margin-bottom:5px; flex-wrap:nowrap; gap:6px;">
    <div style="display:flex; align-items:center; gap:4px;">

</div>

<div class="main" id="main-content">

</div>

<div class="export-area">
  <button class="export-btn btn-expand" onclick="window.expandAll()">📂 全展開</button>
  <button class="export-btn btn-collapse" onclick="window.collapseAll()">📁 全縮小</button>
  <button class="export-btn btn-export" onclick="window.exportSummary()">📋 サマリーコピー</button>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">🏫 園を追加</div>

  </div>
</div>

window.toggleDrawer = function(open) {

  if(!overlay || !drawer) return;
  if (open) {
    overlay.style.display = 'block';

    if(listCont) {
      listCont.innerHTML = schools.map(s => `
        <button class="tab-btn ${s.id===currentId?'active':'inactive'}" style="text-align:left; width:100%; border-radius:8px;" onclick="window.switchSchool('${escJ(s.id)}'); window.toggleDrawer(false);">${escH(s.name)}</button>

    drawer.style.left = '-280px';
    setTimeout(() => { overlay.style.display = 'none'; }, 200);
  }
};

function bindRealtimeSync() {
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  if(!currentUser || !currentId) return;

  const docRef = doc(db, "users", currentUser.uid, "checklists", currentId);
  unsubscribeSnapshot = onSnapshot(docRef, (snapshot) => {
    if (snapshot.exists() && snapshot.metadata.hasPendingWrites === false) {
      const serverData = snapshot.data();
      const sc = schools.find(x => x.id === currentId);
      if(sc) {
          sc.name = serverData.name || sc.name;
          sc.date = serverData.date || "";
          sc.data = serverData.data || makeEmptyData();
          renderMain();
          renderTabs();
      }
      statusEl.textContent = "クラウド同期済";
      statusEl.className = "status-saved";
    }
  });
}

async function firebaseLoadData() {
  if(!currentUser) return;
  statusEl.textContent = "読込中...";
  try {
    const qSnap = await getDocs(collection(db, "users", currentUser.uid, "checklists"));
    schools = [];
    qSnap.forEach(docSnap => {
        const d = docSnap.data();
        let schoolData = d.data;
        if (!schoolData) {
            schoolData = makeEmptyData();
            for (const key in d) {
                if (key !== 'name' && key !== 'date' && key !== 'updatedAt') {
                    schoolData[key] = d[key];
                }
            }
        }
        schools.push({ id: docSnap.id, name: d.name || docSnap.id, date: d.date || "", data: schoolData });
    });
    
    if (schools.length > 0) {
        currentId = schools[0].id;
        statusEl.textContent = "クラウド同期済";
        statusEl.className = "status-saved";
        bindRealtimeSync();
    } else {
        currentId = null;
        statusEl.textContent = "園を追加してください";
        statusEl.className = "";
    }
    renderAll();
  } catch(e) { 
    statusEl.textContent = "読込エラー";
    console.error("Firebase読み込みエラー: ", e); 
  }
}

function scheduleSave(id) {
  statusEl.textContent = "保存中...";
  statusEl.className = "status-saving";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
      const s = schools.find(x=>x.id===id);
      if (!s || !currentUser) return;
      try {
          await setDoc(doc(db, "users", currentUser.uid, "checklists", id), {
              name: s.name,
              date: s.date || "",
              data: s.data
          }, { merge: true });
          statusEl.textContent = "クラウド同期済";
          statusEl.className = "status-saved";
      } catch(e){
          statusEl.textContent = "保存失敗";
      }
  }, 400);
}

        firebaseLoadData();

        loginOverlay.style.display = 'flex';
        if(unsubscribeSnapshot) unsubscribeSnapshot();
    }
});

function makeEmptyData() {
  const d = {};
  for (const sec of SECTIONS) {
    for (const row of sec.rows) {
      if (row.type === "stars") d[row.id] = {stars:0};
      else if (row.type === "text" || row.type === "textarea" || row.type === "time") d[row.id] = {value:""};
      else d[row.id] = {selected:[],note:""};
    }
  }
  return d;
}

window.addSchool = async function() {
  const name = document.getElementById("modal-input").value.trim();
  if (!name || !currentUser) return;
  if (schools.some(s => s.name === name)) { alert("同名の園がすでに存在します。"); return; }
  
  const id = name; 
  const school = {id, name, date:"", data: makeEmptyData()};
  schools.push(school);
  currentId = id;
  closeModal();
  
  try {
      await setDoc(doc(db, "users", currentUser.uid, "checklists", id), {
          name: name,
          date: "",
          data: school.data
      });
      renderAll();
      bindRealtimeSync();
  } catch(e) { console.error("園の追加エラー: ", e); }
};

window.deleteSchool = async function(id) {
  if (!confirm(`「${schools.find(s=>s.id===id)?.name}」を削除しますか？\n（クラウド上のデータも完全に消えます）`)) return;
  if(!currentUser) return;
  try { await deleteDoc(doc(db, "users", currentUser.uid, "checklists", id)); } catch(e){ console.error(e); }
  schools = schools.filter(s=>s.id!==id);
  if (currentId === id) currentId = schools.length > 0 ? schools[0].id : null;
  renderAll();
  if(currentId) bindRealtimeSync();
  else { statusEl.textContent = "園を追加してください"; statusEl.className = ""; }
};

};

window.handleSchoolNameChange = async function(id, newName) {
  newName = newName.trim();
  if (!newName || !currentUser) return;
  
  const sc = schools.find(s => s.id === id);
  if (sc && sc.name === newName) return;
  if (schools.some(s => s.name === newName)) { alert("その園名はすでに使用されています。"); renderMain(); return; }
  
  try {
      const oldDocRef = doc(db, "users", currentUser.uid, "checklists", id);
      const newDocRef = doc(db, "users", currentUser.uid, "checklists", newName);
      const oldSnap = await getDoc(oldDocRef);
      if (oldSnap.exists()) {
          await setDoc(newDocRef, { ...oldSnap.data(), name: newName, updatedAt: new Date() });
          await deleteDoc(oldDocRef);
          const idx = schools.findIndex(s => s.id === id);
          if (idx !== -1) { schools[idx].id = newName; schools[idx].name = newName; }
          currentId = newName;
          renderAll();
          bindRealtimeSync();
      }
  } catch(e) { alert("園名の変更に失敗しました。"); }
};

window.toggleChip = function(secId, rowId, opt) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {selected:[],note:""};
  const sel = d.selected || [];
  sc.data[rowId] = {...d, selected: sel.includes(opt) ? sel.filter(o=>o!==opt) : [...sel,opt]};
  scheduleSave(currentId);
  
  const sec = SECTIONS.find(s=>s.id===secId);
  const col = COLOR_MAP[sec.c];
  document.querySelectorAll(`[data-row="${rowId}"] .chip`).forEach(el => {
    const isSelected = sc.data[rowId].selected.includes(el.dataset.opt);
    el.className = "chip" + (isSelected ? " selected" : "");
    if (document.body.classList.contains('dark-theme')) {
        el.style.background = isSelected ? col.color : "var(--surface)";
    } else {
        el.style.background = isSelected ? col.color : "#fff";
    }
    el.style.color = isSelected ? "#fff" : col.color;
  });
  updateProgress(secId);
};

window.updateTextField = function(rowId, value) {
  const sc = currentSchool(); if (!sc) return;
  sc.data[rowId] = {value};
  scheduleSave(currentId);
  updateProgress(SECTIONS.find(sec=>sec.rows.some(r=>r.id===rowId))?.id);
};

window.updateNote = function(rowId, note) {
  const sc = currentSchool(); if (!sc) return;
  const d = sc.data[rowId] || {selected:[],note:""};
  sc.data[rowId] = {...d, note};
  scheduleSave(currentId);
};

window.setStars = function(secId, rowId, n, highlight) {
  const sc = currentSchool(); if (!sc) return;
  sc.data[rowId] = {stars: sc.data[rowId]?.stars === n ? 0 : n};
  scheduleSave(currentId);
  
  const col = highlight ? "var(--orange)" : "#f59e0b";
  document.querySelectorAll(`[data-row="${rowId}"] .star-btn`).forEach((el,i) => {
    el.style.color = (i < sc.data[rowId].stars) ? col : "var(--border)";
  });
  updateProgress(secId);
};

function calcProgress(secId) {
  const sc = currentSchool(); if (!sc) return {filled:0, total:0};
  const sec = SECTIONS.find(s=>s.id===secId); if (!sec) return {filled:0,total:0};
  let filled=0, total=sec.rows.length;
  for (const row of sec.rows) {
    const d = sc.data?.[row.id] || {};
    if (row.type==="stars" && (d.stars||0)>0) filled++;
    else if ((row.type==="text"||row.type==="textarea"||row.type==="time") && d.value?.trim()) filled++;
    else if (!row.type && (d.selected?.length>0||d.note?.trim())) filled++;
  }
  return {filled, total};
}

function updateProgress(secId) {
  if (!secId) return;
  const {filled, total} = calcProgress(secId);
  const pct = total>0 ? (filled/total*100) : 0;
  const bar = document.querySelector(`[data-sec="${secId}"] .progress-fill`);
  const tag = document.querySelector(`[data-sec="${secId}"] .progress-tag`);
  if (bar) bar.style.width = pct + "%";
  if (tag) tag.textContent = `${filled}/${total}`;
}

window.toggleSection = function(secId) {
  if (currentViewMode === 'a3') return;
  openSections[secId] = !openSections[secId];
  const body = document.querySelector(`[data-sec="${secId}"] .section-body`);
  const arrow = document.querySelector(`[data-sec="${secId}"] .section-arrow`);
  const hdr = document.querySelector(`[data-sec="${secId}"] .section-header`);
  if (body) body.style.display = openSections[secId] ? "" : "none";
  if (arrow) { arrow.textContent = openSections[secId] ? "▲" : "▼"; arrow.className = "section-arrow" + (openSections[secId]?" open":""); }
  if (hdr) hdr.className = "section-header" + (openSections[secId]?" open":"");
};

window.expandAll = function() {
  for (const s of SECTIONS) {
    openSections[s.id] = true;
    const body = document.querySelector(`[data-sec="${s.id}"] .section-body`);
    const arrow = document.querySelector(`[data-sec="${s.id}"] .section-arrow`);
    const hdr = document.querySelector(`[data-sec="${s.id}"] .section-header`);
    if (body) body.style.display = "";
    if (arrow) { arrow.textContent = "▲"; arrow.className = "section-arrow open"; }
    if (hdr) hdr.className = "section-header open";
  }
};

window.collapseAll = function() {
  for (const s of SECTIONS) {
    openSections[s.id] = false;
    const body = document.querySelector(`[data-sec="${s.id}"] .section-body`);
    const arrow = document.querySelector(`[data-sec="${s.id}"] .section-arrow`);
    const hdr = document.querySelector(`[data-sec="${s.id}"] .section-header`);
    if (body) body.style.display = "none";
    if (arrow) { arrow.textContent = "▼"; arrow.className = "section-arrow"; }
    if (hdr) hdr.className = "section-header";
  }
};

function renderTabs() {
  const cont = document.getElementById("school-tabs");
  if(!cont) return;
  let html = schools.map(s => `
    <button class="tab-btn ${s.id===currentId?'active':'inactive'}" onclick="window.switchSchool('${escJ(s.id)}')">${escH(s.name)}</button>
  `).join("");
  html += `<button class="tab-add" onclick="window.openModal()">＋ 園を追加</button>`;
  cont.innerHTML = html;
}

function renderSchoolHeader(sc) {
  return `
  <div class="school-header">
    <div class="school-name-row">
      <input class="school-name-input" value="${escH(sc.name)}" placeholder="園名"
        onchange="window.handleSchoolNameChange('${escJ(sc.id)}', this.value)" maxlength="30">
      <button class="delete-btn" onclick="window.deleteSchool('${escJ(sc.id)}')" title="この園を削除">🗑</button>
    </div>
    <div class="date-row">
      📅 見学日：
      <input type="date" class="date-input" value="${sc.date||''}"
        onchange="window.updateSchoolMeta('date',this.value)">
    </div>
  </div>`;
}

window.updateSchoolMeta = function(field, value) {
  const sc = currentSchool(); if (!sc) return;
  sc[field] = value;
  if (field === "name") renderTabs();
  scheduleSave(currentId);
};

function renderRow(row, sc, col) {
  const d = sc.data?.[row.id] || {};
  let inner = "";
  if (row.type === "stars") {
    const stars = d.stars||0;
    const starColor = row.highlight ? "var(--orange)" : "#f59e0b";
    const btns = [1,2,3,4,5].map(n =>
      `<button class="star-btn" style="color:${n<=stars?starColor:'var(--gray-bg)'}" onclick="window.setStars('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}',${n},${!!row.highlight})">★</button>`
    ).join("");
    inner = `<div class="stars" data-row="${row.id}">${btns}</div>`;
  } else if (row.type==="text") {
    inner = `<input class="text-input" style="--sec-color:${col.color}" value="${escH(d.value||'')}" placeholder="${escH(row.ph||'')}"
      oninput="window.updateTextField('${row.id}',this.value)">`;
  } else if (row.type==="time") {
    inner = `<input type="time" class="text-input" style="--sec-color:${col.color}" value="${escH(d.value||'')}"
      oninput="window.updateTextField('${row.id}',this.value)">`;
  } else if (row.type==="textarea") {
    inner = `<textarea class="textarea" style="--sec-color:${col.color}" placeholder="${escH(row.ph||'')}"
      oninput="window.updateTextField('${row.id}',this.value)">${escH(d.value||'')}</textarea>`;
  } else {
    const chips = (row.opts||[]).map(opt => {
      const sel = (d.selected||[]).includes(opt);
      const bgStyle = sel ? col.color : "var(--surface)";
      return `<button class="chip ${sel?'selected':''}" data-opt="${escH(opt)}"
        style="border-color:${col.color};background:${bgStyle};color:${sel?'#fff':col.color}"
        onclick="window.toggleChip('${SECTIONS.find(s=>s.rows.includes(row)).id}','${row.id}','${escJ(opt)}')">${escH(opt)}</button>`;
    }).join("");
    const note = row.hasNote ? `<input class="note-input" value="${escH(d.note||'')}" placeholder="${escH(row.np||'メモ')}"
      oninput="window.updateNote('${row.id}',this.value)">` : "";
    inner = `<div class="chips" data-row="${row.id}">${chips}</div>${note}`;
  }

  const badge = row.b==="重要" ? `<span class="badge badge-req">重要</span>` :
                row.b==="事前" ? `<span class="badge badge-pre">事前</span>` : "";
  return `
    <div class="row" data-row="${row.id}">
      <div class="row-label">${badge}<span class="label-text">${escH(row.l)}</span></div>
      ${inner}
    </div>`;
}

function renderMain() {
  const cont = document.getElementById("main-content");
  if(!cont) return;
  const sc = currentSchool();
  if (!sc) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">🏫</div><div class="empty-text">上の「＋ 園を追加」から<br>見学する園を登録してください</div></div>`;
    return;
  }
  let html = renderSchoolHeader(sc);
  if(currentViewMode === 'a3') html += '<div class="main-container-grid">';
  html += SECTIONS.map(sec => renderSection(sec, sc)).join("");
  if(currentViewMode === 'a3') html += '</div>';
  cont.innerHTML = html;
  
  SECTIONS.forEach(sec => updateProgress(sec.id));
}

function renderAll() { renderTabs(); renderMain(); }

window.exportSummary = function() {
  const sc = currentSchool();
  if (!sc) { alert("園が選択されていません"); return; }
  let txt = `【${sc.name}】見学まとめ\n`;
  if (sc.date) txt += `見学日：${sc.date}\n`;
  txt += "\n";
  for (const sec of SECTIONS) {
    let secTxt = "";
    for (const row of sec.rows) {
      const d = sc.data?.[row.id]||{};
      if (row.type==="stars") {
        if (d.stars>0) secTxt += `  ${row.l}：${"★".repeat(d.stars)}${"☆".repeat(5-d.stars)}\n`;
      } else if (row.type==="text"||row.type==="textarea"||row.type==="time") {
        if (d.value?.trim()) secTxt += `  ${row.l}：${d.value}\n`;
      } else {
        const parts = [];
        if (d.selected?.length>0) parts.push(d.selected.join("・"));
        if (d.note?.trim()) parts.push(`(${d.note})`);
        if (parts.length>0) secTxt += `  ${row.l}：${parts.join(" ")}\n`;
      }
    }
    if (secTxt) txt += `${sec.e}${sec.n?sec.n+" ":""}${sec.t}\n${secTxt}\n`;
  }
  navigator.clipboard.writeText(txt).then(()=>{
    alert("コピー完了！メモ等に貼り付けてください📋");
  }).catch(()=>{ prompt("コピーしてください:", txt); });
};

function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escJ(s) { return String(s).replace(/'/g,"\\'"); }

checkEmailLinkSignIn();
</script>
